usb_camera_node:
  ros__parameters:
    camera_device_v4l_url: $(var camera_path)  # /dev/v4l/by-id/...
    camera_info_url: "package://usb_camera/config/camera_info.yaml"
    image_topic: "usb_camera/image/compressed"
    image_raw_topic: "usb_camera/image_raw"
    camera_info_topic: "usb_camera/camera_info"
    frame_id: "camera_optical_frame"

    image_width: 1280
    image_height: 720
    frame_rate: 60
    exposure_time_mode: 0  # 0: manual, 1: auto
    exposure_time: 170
    brightness: 60
    contrast: 50
    saturation: 60
