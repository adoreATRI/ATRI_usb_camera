minimum_pre_commit_version: "3.0.0"

default_stages: [pre-commit]

exclude: ^(build|install|log)/

repos:
  - repo: local
    hooks:
      - id: package-xml
        name: package.xml syntax check
        entry: xmllint --noout
        language: system
        files: ^package\.xml$

      - id: python-compile
        name: Python syntax check
        entry: python3 -m py_compile
        language: system
        types: [python]

      - id: clang-format
        name: clang-format C++ sources
        entry: clang-format -i
        language: system
        files: ^(src|include)/.*\.(c|cc|cpp|cxx|h|hh|hpp|hxx)$

      - id: clang-tidy
        name: clang-tidy C++ sources
        entry: bash -c 'if ! command -v clang++ >/dev/null 2>&1; then echo "Install clang/clang++ before running clang-tidy"; exit 1; fi; if [ ! -f build/usb_camera/compile_commands.json ]; then echo "Run colcon build first to generate build/usb_camera/compile_commands.json"; exit 1; fi; clang-tidy -p build/usb_camera "$@"' --
        language: system
        files: ^src/.*\.cpp$
        stages: [manual]

      - id: colcon-build-release
        name: colcon build Release
        entry: bash -c 'colcon build --packages-select usb_camera --cmake-args -DCMAKE_BUILD_TYPE=Release'
        language: system
        pass_filenames: false
        stages: [manual]

      - id: colcon-test
        name: colcon test
        entry: bash -c 'colcon test --packages-select usb_camera && colcon test-result'
        language: system
        pass_filenames: false
        stages: [manual]
